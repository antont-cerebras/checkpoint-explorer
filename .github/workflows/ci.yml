name: Rust CI

# Run on every push and pull request
on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    # Use the latest Ubuntu runner
    runs-on: ubuntu-latest

    steps:
      # Check out repository code
      - name: Checkout source
        uses: actions/checkout@v3

      # Install the Rust toolchain (stable) and common components
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # The `hdf5` feature statically builds a bundled libhdf5 from source,
      # which needs a C toolchain, CMake and zlib development headers.
      - name: Install HDF5 build prerequisites
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential zlib1g-dev

      # Cache compiled dependencies (including the built libhdf5) to speed-up
      # subsequent runs
      - name: Cache cargo build outputs
        uses: Swatinem/rust-cache@v2

      # Ensure the codebase is formatted according to rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

      # Lint the default (pure-Rust) configuration that `cargo install` produces,
      # then again with all features enabled (which compiles the HDF5 support).
      - name: Lint with clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Lint with clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Build both configurations in release mode
      - name: Build (default features)
        run: cargo build --workspace --release --verbose

      - name: Build (all features)
        run: cargo build --workspace --release --all-features --verbose

      # Run tests (the HDF5 reader's tests require its feature)
      - name: Run tests
        env:
          # libhdf5 takes an flock() on every file it opens; CI runners' overlay
          # filesystems can return EAGAIN (errno 11) for that, failing the
          # convert/HDF5 tests. Reads don't need the lock — disable it, matching
          # the local test gate (the binary does the same at startup).
          HDF5_USE_FILE_LOCKING: "FALSE"
        run: cargo test --workspace --all-features --verbose
